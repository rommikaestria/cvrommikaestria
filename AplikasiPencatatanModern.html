<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SakuCatat - Notes & Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .note-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
      }
      .note-card:hover {
        transform: translateY(-4px);
      }
      .editor-content:empty:before {
        content: attr(data-placeholder);
        color: #cbd5e1;
        cursor: text;
      }
      /* Style for checklist items */
      .note-content ul,
      .editor-content ul {
        list-style-type: none;
        padding-left: 0;
      }

      .note-content li,
      .editor-content li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        padding: 4px;
        border-radius: 6px;
      }

      .note-content li::before,
      .editor-content li::before {
        content: '☐';
        color: #6366f1;
        font-weight: bold;
        flex-shrink: 0;
        cursor: pointer;
        font-size: 1.1em;
        transition: transform 0.2s;
      }

      /* Checkbox behavior inside the editor and card */
      .note-content li.done,
      .editor-content li.done {
        opacity: 0.6;
        text-decoration: line-through;
        color: #94a3b8;
      }

      .note-content li.done::before,
      .editor-content li.done::before {
        content: '☑';
        color: #10b981;
        text-decoration: none !important;
        display: inline-block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      /* Dropdown transition */
      #addDropdown {
        transition: all 0.2s ease-out;
        transform-origin: top right;
      }
      #addDropdown.hidden {
        display: none;
        opacity: 0;
        transform: scale(0.95);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav
      class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200">
      <div
        class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-200">
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
          </div>
          <h1
            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">
            SakuCatat
          </h1>
        </div>

        <div class="flex-1 max-w-md mx-4 hidden sm:block">
          <div class="relative">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari catatan atau tugas..."
              class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-sm" />
            <svg
              class="w-4 h-4 text-slate-400 absolute left-3 top-3"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
        </div>

        <div class="relative">
          <button
            id="btnOpenAdd"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all shadow-md active:scale-95">
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"></path>
            </svg>
            <span>Tambah</span>
            <svg
              class="w-3 h-3 ml-1 opacity-60"
              fill="currentColor"
              viewBox="0 0 20 20">
              <path
                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"></path>
            </svg>
          </button>

          <!-- Dropdown Menu -->
          <div
            id="addDropdown"
            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-slate-100 py-2 z-50">
            <button
              onclick="openModal(null, 'note')"
              class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 flex items-center gap-3 transition-colors">
              <svg
                class="w-4 h-4 text-indigo-500"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
              </svg>
              Buat Catatan
            </button>
            <button
              onclick="openModal(null, 'todo')"
              class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 flex items-center gap-3 transition-colors">
              <svg
                class="w-4 h-4 text-indigo-500"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
              </svg>
              Membuat To-do List
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <!-- Search Mobile -->
      <div class="mb-6 sm:hidden">
        <input
          type="text"
          id="searchInputMobile"
          placeholder="Cari catatan..."
          class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all" />
      </div>

      <!-- Section: Pinned -->
      <div id="pinnedSection" class="mb-10 hidden">
        <h2
          class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05l-3.293 3.293a1 1 0 01-1.414 0l-3.293-3.293a1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.789l1.599.8L9 4.323V3a1 1 0 011-1z"></path>
          </svg>
          Disematkan
        </h2>
        <div
          id="pinnedGrid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></h1>
      </div>

      <!-- Section: All Notes -->
      <div>
        <h2
          id="othersTitle"
          class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
          Semua Catatan
        </h2>
        <div
          id="notesGrid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Empty State -->
          <div
            id="emptyState"
            class="col-span-full py-20 flex flex-col items-center justify-center text-slate-400">
            <div
              class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-4">
              <svg
                class="w-12 h-12"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <p class="text-lg font-medium">Belum ada catatan</p>
            <p class="text-sm">Gunakan tombol 'Tambah' untuk memulai.</p>
          </div>
        </div>
      </div>
    </main>

    <div
      id="modalOverlay"
      class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-4">
      <div
        id="modalContent"
        class="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden scale-95 transition-transform duration-300">
        <div class="p-6">
          <!-- Toolbar Editor -->
          <div
            class="flex items-center gap-1 mb-4 p-1 bg-slate-50 rounded-lg w-fit border border-slate-200">
            <button
              onclick="formatDoc('bold')"
              title="Tebal"
              class="w-9 h-9 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-md transition-all text-slate-600 font-bold">
              B
            </button>
            <button
              onclick="formatDoc('italic')"
              title="Miring"
              class="w-9 h-9 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-md transition-all text-slate-600 italic">
              I
            </button>
            <button
              onclick="formatDoc('underline')"
              title="Garis Bawah"
              class="w-9 h-9 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-md transition-all text-slate-600 underline">
              U
            </button>
            <div class="w-px h-4 bg-slate-300 mx-1"></div>
            <button
              id="toolbarList"
              onclick="formatDoc('insertUnorderedList')"
              title="To-do List"
              class="w-9 h-9 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-md transition-all text-slate-600">
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
              </svg>
            </button>
          </div>

          <input
            type="text"
            id="noteTitleInput"
            placeholder="Judul"
            class="w-full text-xl font-bold border-none focus:ring-0 mb-2 p-0 placeholder:text-slate-300 bg-transparent" />

          <div
            id="noteBodyInput"
            contenteditable="true"
            data-placeholder="Tuliskan sesuatu..."
            class="editor-content w-full min-h-[200px] max-h-[400px] overflow-y-auto border-none focus:ring-0 p-0 text-slate-600 outline-none"></div>

          <div class="mt-6 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-2">
              <span
                class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-1">
                Tema:
              </span>
              <div class="flex gap-1.5" id="colorPicker">
                <button
                  data-color="bg-white"
                  class="w-6 h-6 rounded-full border border-slate-200 bg-white ring-offset-2 transition-all"></button>
                <button
                  data-color="bg-rose-50"
                  class="w-6 h-6 rounded-full bg-rose-50 border border-rose-100 ring-offset-2 transition-all"></button>
                <button
                  data-color="bg-amber-50"
                  class="w-6 h-6 rounded-full bg-amber-50 border border-amber-100 ring-offset-2 transition-all"></button>
                <button
                  data-color="bg-emerald-50"
                  class="w-6 h-6 rounded-full bg-emerald-50 border border-emerald-100 ring-offset-2 transition-all"></button>
                <button
                  data-color="bg-sky-50"
                  class="w-6 h-6 rounded-full bg-sky-50 border border-sky-100 ring-offset-2 transition-all"></button>
                <button
                  data-color="bg-violet-50"
                  class="w-6 h-6 rounded-full bg-violet-50 border border-violet-100 ring-offset-2 transition-all"></button>
              </div>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
              <button
                id="btnCancel"
                class="flex-1 sm:flex-none px-6 py-2 rounded-xl text-slate-500 font-semibold hover:bg-slate-100 transition-colors">
                Batal
              </button>
              <button
                id="btnSave"
                class="flex-1 sm:flex-none px-6 py-2 rounded-xl bg-indigo-600 text-white font-semibold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                Simpan
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let notes = JSON.parse(localStorage.getItem('notes')) || [];
      let editingId = null;
      let selectedColor = 'bg-white';

      const addDropdown = document.getElementById('addDropdown');
      const btnOpenAdd = document.getElementById('btnOpenAdd');
      const notesGrid = document.getElementById('notesGrid');
      const pinnedGrid = document.getElementById('pinnedGrid');
      const pinnedSection = document.getElementById('pinnedSection');
      const emptyState = document.getElementById('emptyState');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalContent = document.getElementById('modalContent');
      const noteTitleInput = document.getElementById('noteTitleInput');
      const noteBodyInput = document.getElementById('noteBodyInput');

      /* Toggle Dropdown */
      btnOpenAdd.addEventListener('click', (e) => {
        e.stopPropagation();
        addDropdown.classList.toggle('hidden');
      });

      document.addEventListener('click', () => {
        addDropdown.classList.add('hidden');
      });

      function formatDoc(cmd) {
        document.execCommand(cmd, false, null);
        noteBodyInput.focus();
      }

      // Function to handle clicking on task items to toggle done state
      function setupChecklistListeners() {
        // Listener for Modal Editor
        noteBodyInput.onclick = (e) => {
          if (e.target.tagName === 'LI') {
            toggleTaskState(e.target);
            // Sort items in editor after toggle
            sortListItems(e.target.parentElement);
          }
        };
      }

      function toggleTaskState(liElement) {
        liElement.classList.toggle('done');
      }

      function sortListItems(ulElement) {
        if (!ulElement) return;
        const items = Array.from(ulElement.children);
        // Sort: unchecked items (false) come before checked items (true)
        items.sort((a, b) => {
          const aDone = a.classList.contains('done');
          const bDone = b.classList.contains('done');
          return aDone - bDone;
        });
        // Re-append in new order
        items.forEach((item) => ulElement.appendChild(item));
      }

      function openModal(id = null, type = 'note') {
        editingId = id;
        addDropdown.classList.add('hidden');

        if (id) {
          const note = notes.find((n) => n.id === id);
          noteTitleInput.value = note.title;
          noteBodyInput.innerHTML = note.body;
          selectedColor = note.color;
        } else {
          noteTitleInput.value = '';
          noteBodyInput.innerHTML = '';
          selectedColor = 'bg-white';

          // Jika tipe to-do, otomatis jalankan checklist
          if (type === 'todo') {
            setTimeout(() => {
              noteBodyInput.focus();
              formatDoc('insertUnorderedList');
            }, 300);
          }
        }

        updateColorPickerUI();
        setupChecklistListeners();
        modalOverlay.classList.remove('pointer-events-none', 'opacity-0');
        modalContent.classList.remove('scale-95');
        noteBodyInput.focus();
      }

      function closeModal() {
        modalOverlay.classList.add('pointer-events-none', 'opacity-0');
        modalContent.classList.add('scale-95');
        editingId = null;
      }

      // Handle toggle directly from the card without opening modal
      function handleCardTodoToggle(event, noteId, itemIndex) {
        event.stopPropagation();
        const noteIndex = notes.findIndex((n) => n.id === noteId);
        if (noteIndex === -1) return;

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = notes[noteIndex].body;
        const li = tempDiv.querySelectorAll('li')[itemIndex];

        if (li) {
          toggleTaskState(li);
          const ul = li.parentElement;
          sortListItems(ul);
          notes[noteIndex].body = tempDiv.innerHTML;
          notes[noteIndex].updatedAt = new Date().toISOString();
          localStorage.setItem('notes', JSON.stringify(notes));
          renderNotes();
        }
      }

      function renderNotes(filter = '') {
        const filteredNotes = notes.filter(
          (n) =>
            n.title.toLowerCase().includes(filter.toLowerCase()) ||
            n.body.toLowerCase().includes(filter.toLowerCase()),
        );

        const pinned = filteredNotes.filter((n) => n.pinned);
        const others = filteredNotes.filter((n) => !n.pinned);

        pinnedSection.classList.toggle('hidden', pinned.length === 0);
        pinnedGrid.innerHTML = pinned
          .map((note) => createNoteCard(note))
          .join('');

        if (others.length > 0) {
          emptyState.classList.add('hidden');
          notesGrid.innerHTML = others
            .map((note) => createNoteCard(note))
            .join('');
        } else {
          notesGrid.innerHTML = '';
          if (pinned.length === 0) emptyState.classList.remove('hidden');
        }
      }

      function createNoteCard(note) {
        const date = new Date(note.updatedAt).toLocaleDateString('id-ID', {
          day: 'numeric',
          month: 'short',
        });

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = note.body;
        const listItems = tempDiv.querySelectorAll('li');
        const isTodo = listItems.length > 0;

        // If it's a todo, wrap <li> content to make them clickable separately in card view
        if (isTodo) {
          listItems.forEach((li, index) => {
            const statusClass = li.classList.contains('done') ? 'done' : '';
            li.setAttribute(
              'onclick',
              `handleCardTodoToggle(event, '${note.id}', ${index})`,
            );
            li.className = `${statusClass} hover:bg-black/5 rounded px-1 transition-colors`;
          });
        }

        return `
                <div onclick="openModal('${note.id}')" class="note-card ${note.color} p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md flex flex-col h-fit group animate-fade-in relative">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-2">
                            ${isTodo ? '<span class="px-2 py-0.5 bg-indigo-100 text-indigo-600 text-[10px] font-bold rounded-full uppercase">Todo</span>' : ''}
                            <h3 class="font-bold text-slate-800 line-clamp-1">${note.title || 'Tanpa Judul'}</h3>
                        </div>
                        <button onclick="event.stopPropagation(); togglePin('${note.id}')" class="p-1.5 rounded-lg hover:bg-black/5 text-slate-400 transition-colors ${note.pinned ? 'text-indigo-600' : ''}">
                            <svg class="w-4 h-4" fill="${note.pinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.5 6L10.5 6M9 21h6m-3-3V3m-5 3h10"></path></svg>
                        </button>
                    </div>
                    <div class="note-content text-sm text-slate-600 mb-6 line-clamp-6">${tempDiv.innerHTML}</div>
                    <div class="mt-auto flex items-center justify-between">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${date}</span>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="event.stopPropagation(); deleteNote('${note.id}')" class="p-2 bg-white/80 hover:bg-rose-50 rounded-xl shadow-sm text-rose-500 transition-all border border-black/5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
      }

      function saveNote() {
        const title = noteTitleInput.value.trim();

        // Final sort for any lists in the editor before saving
        const lists = noteBodyInput.querySelectorAll('ul');
        lists.forEach((ul) => sortListItems(ul));

        const body = noteBodyInput.innerHTML.trim();

        if (
          !title &&
          (body === '' || body === '<br>' || body === '<ul><li><br></li></ul>')
        )
          return closeModal();

        const noteData = {
          id: editingId || Date.now().toString(),
          title,
          body,
          color: selectedColor,
          pinned: editingId
            ? notes.find((n) => n.id === editingId).pinned
            : false,
          updatedAt: new Date().toISOString(),
        };

        if (editingId) {
          notes = notes.map((n) => (n.id === editingId ? noteData : n));
        } else {
          notes.unshift(noteData);
        }

        localStorage.setItem('notes', JSON.stringify(notes));
        renderNotes();
        closeModal();
      }

      function deleteNote(id) {
        if (confirm('Hapus item ini?')) {
          notes = notes.filter((n) => n.id !== id);
          localStorage.setItem('notes', JSON.stringify(notes));
          renderNotes();
        }
      }

      function togglePin(id) {
        notes = notes.map((n) =>
          n.id === id ? { ...n, pinned: !n.pinned } : n,
        );
        localStorage.setItem('notes', JSON.stringify(notes));
        renderNotes();
      }

      function updateColorPickerUI() {
        const buttons = document.querySelectorAll('#colorPicker button');
        buttons.forEach((btn) => {
          btn.classList.toggle('ring-2', btn.dataset.color === selectedColor);
          btn.classList.toggle(
            'ring-indigo-400',
            btn.dataset.color === selectedColor,
          );
        });
        modalContent.className = `${selectedColor} w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden transition-all duration-300`;
      }

      document.getElementById('colorPicker').addEventListener('click', (e) => {
        if (e.target.dataset.color) {
          selectedColor = e.target.dataset.color;
          updateColorPickerUI();
        }
      });

      document
        .getElementById('btnCancel')
        .addEventListener('click', closeModal);
      document.getElementById('btnSave').addEventListener('click', saveNote);
      document
        .getElementById('searchInput')
        .addEventListener('input', (e) => renderNotes(e.target.value));

      window.onload = () => renderNotes();
    </script>
  </body>
</html>
